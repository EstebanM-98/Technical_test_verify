

services:
  ocr:
    build:
      context: .
      dockerfile: components/ocr/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ocr_cache:/app/ocr_cache

  extractor:
    build:
      context: .
      dockerfile: components/extractor/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./logs:/app/logs

  validator:
    build:
      context: .
      dockerfile: components/validator/Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - ./logs:/app/logs

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OCR_URL=http://ocr:8001/process
      - EXTRACTOR_URL=http://extractor:8002/extract
      - VALIDATOR_URL=http://validator:8003/validate
    depends_on:
      - ocr
      - extractor
      - validator
    volumes:
      - backend_data:/app/data
      - ./logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./logs:/app/logs

  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    profiles:
      - test
    environment:
      - LOG_DIR=/tmp/test-logs
    volumes:
      - ./tests/reports:/app/tests/reports
      - ./logs:/app/logs
    command: ["python", "-m", "pytest", "-v"]

volumes:
  backend_data:
  ocr_cache:
