version: '3.8'

services:
  ocr:
    build:
      context: .
      dockerfile: components/ocr/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env

  extractor:
    build:
      context: .
      dockerfile: components/extractor/Dockerfile
    ports:
      - "8002:8002"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OCR_URL=http://ocr:8001/process
      - EXTRACTOR_URL=http://extractor:8002/extract
    depends_on:
      - ocr
      - extractor

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
